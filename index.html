<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소년 민원 제안 앱</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    background-color: #f4f6f9;
}

h1{
    text-align: center;
}

.form-box{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, select, textarea{
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button{
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.register{
    background-color: #4CAF50;
    color: white;
}

.agree{
    background-color: #2196F3;
    color: white;
}

.disagree{
    background-color: #f44336;
    color: white;
}

.card{
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.rank-box{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<h1>🏛 청소년 민원 제안 앱</h1>

<div class="form-box">

<h2>민원 작성</h2>

<input type="text" id="title" placeholder="민원 제목">

<select id="category">
    <option>학교</option>
    <option>교통</option>
    <option>환경</option>
    <option>안전</option>
    <option>기타</option>
</select>

<textarea id="content" rows="5" placeholder="민원 내용을 입력하세요"></textarea>

<button class="register" onclick="addPost()">등록하기</button>

</div>

<div class="rank-box">
<h2>🔥 인기 민원 TOP 3</h2>
<div id="topPosts">아직 등록된 민원이 없습니다.</div>
</div>

<h2>📋 민원 목록</h2>

<div id="postList"></div>

<script>

let posts = [];

function addPost(){

    const title = document.getElementById("title").value;
    const category = document.getElementById("category").value;
    const content = document.getElementById("content").value;

    if(title.trim()==="" || content.trim()===""){
        alert("제목과 내용을 입력해주세요.");
        return;
    }

    posts.push({
        title:title,
        category:category,
        content:content,
        agree:0,
        disagree:0
    });

    document.getElementById("title").value="";
    document.getElementById("content").value="";

    displayPosts();
}

function displayPosts(){

    const postList = document.getElementById("postList");

    postList.innerHTML="";

    posts.forEach((post,index)=>{

        postList.innerHTML += `
        <div class="card">
            <h3>${post.title}</h3>
            <p><strong>분야:</strong> ${post.category}</p>
            <p>${post.content}</p>

            <button class="agree" onclick="agreeVote(${index})">
            👍 찬성 (${post.agree})
            </button>

            <button class="disagree" onclick="disagreeVote(${index})">
            👎 반대 (${post.disagree})
            </button>
        </div>
        `;
    });

    updateRanking();
}

function agreeVote(index){
    posts[index].agree++;
    displayPosts();
}

function disagreeVote(index){
    posts[index].disagree++;
    displayPosts();
}

function updateRanking(){

    const topDiv = document.getElementById("topPosts");

    if(posts.length===0){
        topDiv.innerHTML="아직 등록된 민원이 없습니다.";
        return;
    }

    const sorted = [...posts].sort((a,b)=>b.agree-a.agree);

    let html="";

    sorted.slice(0,3).forEach((post,i)=>{

        html += `
        <p>
        ${i+1}위 - ${post.title}
        (찬성 ${post.agree}표)
        </p>
        `;
    });

    topDiv.innerHTML = html;
}

</script>

</body>
</html>
